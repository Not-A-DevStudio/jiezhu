<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="jCradle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" /> <!-- emerald-500 -->
      <stop offset="100%" stop-color="#047857" /> <!-- emerald-700 -->
    </linearGradient>
    <linearGradient id="ballGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" /> <!-- amber-400 -->
      <stop offset="100%" stop-color="#d97706" /> <!-- amber-600 -->
    </linearGradient>
  </defs>
  <!-- The right arm of J and the catching cradle -->
  <path d="M 80 20 L 80 55 A 30 30 0 0 1 20 55 L 20 45" stroke="url(#jCradle)" stroke-width="14" stroke-linecap="round" />
  
  <!-- The caught dot/ball -->
  <circle cx="50" cy="35" r="14" fill="url(#ballGradient)" />
</svg>